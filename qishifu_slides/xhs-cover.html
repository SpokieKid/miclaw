<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #0a0a0a;
  color: #f5f5f5;
}

.page {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 72px 80px;
  position: relative;
}

/* Background glow */
.page::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 500px 400px at 50% 35%, rgba(74, 158, 255, 0.06) 0%, transparent 70%);
  pointer-events: none;
}

/* ── Badge ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px;
  font-size: 22px;
  color: #999;
  letter-spacing: 0.08em;
}

.badge-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #4a9eff;
  box-shadow: 0 0 10px #4a9eff;
}

/* ── Product image ── */
.product-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.product-img {
  width: 480px;
  height: auto;
  filter: drop-shadow(0 20px 60px rgba(0,0,0,0.6));
}

/* ── Main text ── */
.main-text {
  text-align: center;
  position: relative;
  z-index: 1;
}

.headline {
  font-size: 80px;
  font-weight: 800;
  line-height: 1.35;
  letter-spacing: -0.02em;
}

.headline .accent {
  color: #ff4a4a;
}

.subtitle {
  font-size: 32px;
  color: #999;
  font-weight: 400;
  margin-top: 24px;
  letter-spacing: 0.06em;
}

/* ── CTA ── */
.cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 22px 56px;
  border-radius: 100px;
  background: #f5f5f5;
  color: #0a0a0a;
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 0.04em;
  margin-top: 48px;
}

/* ── Footer ── */
.footer {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.logo {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -0.03em;
}

.disclaimer {
  font-size: 20px;
  color: #555;
}
</style>
</head>
<body>

<div class="page">

  <div class="badge">
    <span class="badge-dot"></span>
    AI Walkie-Talkie
  </div>

  <div class="product-area">
    <img class="product-img" src="../site/product-device.png" alt="EinClaw device">
  </div>

  <div class="main-text">
    <div class="headline">
      你只管<span class="accent">说</span><br>
      剩下的交给 Claw
    </div>
    <div class="subtitle">直连 OpenClaw 的语音对讲机</div>
    <div class="cta">众筹进行中 →</div>
  </div>

  <div class="footer">
    <div class="logo">EinClaw</div>
    <div class="disclaimer">* 硬件设计非最终版本</div>
  </div>

</div>

</body>
</html>
