<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EinClaw Cover — XHS Note 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Serif+SC:wght@600;700&display=swap');

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #e8e0d6;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .cover {
    width: 1242px;
    height: 1660px;
    position: relative;
    overflow: hidden;
    background: #f5f0ea;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Top caption */
  .caption {
    margin-top: 120px;
    font-size: 22px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #8a7e72;
    font-weight: 500;
  }

  /* Product image */
  .product-image {
    margin-top: 80px;
    width: 500px;
    height: 500px;
  }

  .product-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* Headline */
  .headline {
    margin-top: 72px;
    text-align: center;
    padding: 0 100px;
  }

  .headline-main {
    font-family: 'Noto Serif SC', 'DM Serif Display', Georgia, serif;
    font-size: 80px;
    font-weight: 700;
    color: #1a1714;
    line-height: 1.4;
    letter-spacing: 0.06em;
  }

  .headline-main .accent {
    color: #e8634a;
  }

  /* Subtitle */
  .subtitle {
    margin-top: 36px;
    font-size: 32px;
    color: #8a7e72;
    text-align: center;
    font-weight: 400;
    letter-spacing: 0.08em;
  }

  /* Bottom */
  .bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 40px 80px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    border-top: 1px solid #ddd5ca;
  }

  .bottom-cta {
    display: inline-block;
    font-size: 32px;
    font-weight: 600;
    color: #fff;
    background: #e8634a;
    padding: 16px 56px;
    border-radius: 100px;
    letter-spacing: 0.1em;
  }

  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
  }

  .bottom-brand {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 32px;
    color: #1a1714;
    font-weight: 400;
  }

  .bottom-disclaimer {
    font-size: 16px;
    color: #c4b5a3;
    font-weight: 400;
  }
</style>
</head>
<body>
<div class="cover">
  <!-- Caption -->
  <div class="caption">AI 对讲机</div>

  <!-- Product photo -->
  <div class="product-image">
    <img src="product-white.png" alt="EinClaw">
  </div>

  <!-- Headline -->
  <div class="headline">
    <div class="headline-main">
      你只管<span class="accent">说</span><br>
      剩下的交给 Claw
    </div>
  </div>

  <!-- Subtitle -->
  <div class="subtitle">直连 OpenClaw 的语音对讲机</div>

  <!-- Bottom -->
  <div class="bottom">
    <div class="bottom-cta">预售开启 →</div>
    <div class="bottom-row">
      <div class="bottom-brand">EinClaw</div>
      <div class="bottom-disclaimer">* 硬件设计非最终版本</div>
    </div>
  </div>
</div>
</body>
</html>
