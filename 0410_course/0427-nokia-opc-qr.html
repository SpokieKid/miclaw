<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4月27日诺基亚 AI+OPC 训练营二维码</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Noto+Serif+SC:wght@500;600;700;900&family=Source+Sans+3:wght@500;600;700&display=swap');

    :root {
      --bg-cream: #fffbf0;
      --bg-cream-deep: #fff6de;
      --bg-white: rgba(255, 255, 255, 0.86);
      --amber: #d97706;
      --amber-deep: #b45309;
      --sage: #65a30d;
      --text-primary: #1c1917;
      --text-secondary: #57534e;
      --text-muted: #78716c;
      --border: rgba(231, 229, 228, 0.9);
      --shadow-card: 0 18px 44px rgba(28, 25, 23, 0.1);
      --gradient-cover:
        radial-gradient(circle at top right, rgba(217, 119, 6, 0.12), transparent 34%),
        radial-gradient(circle at bottom left, rgba(101, 163, 13, 0.08), transparent 30%),
        linear-gradient(180deg, #fffbf0 0%, #fff6de 48%, #fffbf0 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg-cream);
      color: var(--text-primary);
      font-family: "Source Sans 3", "Noto Serif SC", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      overflow: hidden;
    }

    .slide {
      position: relative;
      display: flex;
      min-height: 100vh;
      min-height: 100dvh;
      width: 100vw;
      overflow: hidden;
      background: var(--gradient-cover);
    }

    .slide::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(28, 25, 23, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(28, 25, 23, 0.025) 1px, transparent 1px);
      background-size: clamp(22px, 3vw, 36px) clamp(22px, 3vw, 36px);
      mask-image: radial-gradient(circle at center, black 42%, transparent 82%);
      opacity: 0.32;
      pointer-events: none;
    }

    .slide::after {
      content: "";
      position: absolute;
      right: clamp(2rem, 7vw, 7rem);
      top: clamp(2rem, 8vh, 6rem);
      width: clamp(10rem, 24vw, 22rem);
      height: clamp(10rem, 24vw, 22rem);
      border: 1px solid rgba(217, 119, 6, 0.16);
      border-radius: 999px;
      opacity: 0.58;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(280px, 0.72fr);
      align-items: center;
      gap: clamp(1.8rem, 5vw, 5.5rem);
      width: min(1320px, 90vw);
      margin: auto;
      padding: clamp(2rem, 6vh, 5rem) 0;
    }

    .copy {
      max-width: 680px;
    }

    .eyebrow {
      color: var(--amber);
      font-size: clamp(0.72rem, 1vw, 0.9rem);
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    h1 {
      margin-top: clamp(0.7rem, 1.8vh, 1.3rem);
      font-family: "Noto Serif SC", "Playfair Display", serif;
      font-size: clamp(2.25rem, 5.2vw, 4.8rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .title-line {
      display: block;
      white-space: nowrap;
    }

    .accent {
      color: var(--amber-deep);
    }

    .subhead {
      max-width: 560px;
      margin-top: clamp(1rem, 2.6vh, 1.8rem);
      color: var(--text-secondary);
      font-family: "Noto Serif SC", serif;
      font-size: clamp(1.05rem, 1.7vw, 1.42rem);
      font-weight: 600;
      line-height: 1.75;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin-top: clamp(1.4rem, 4vh, 2.4rem);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 2.25rem;
      padding: 0.42rem 0.88rem;
      border: 1px solid rgba(217, 119, 6, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      color: var(--text-secondary);
      font-size: clamp(0.86rem, 1.1vw, 1rem);
      font-weight: 700;
    }

    .qr-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: min(100%, 460px);
      margin-left: auto;
      padding: clamp(1.2rem, 3vw, 2rem);
      border: 1px solid var(--border);
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.78)),
        var(--bg-white);
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(14px);
    }

    .qr-panel::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(217, 119, 6, 0.14);
      border-radius: 18px;
      pointer-events: none;
    }

    .qr-title {
      color: var(--text-primary);
      font-family: "Noto Serif SC", serif;
      font-size: clamp(1.1rem, 1.8vw, 1.5rem);
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
    }

    .qr-shell {
      margin-top: clamp(1rem, 3vh, 1.8rem);
      padding: clamp(0.8rem, 2vw, 1.2rem);
      border-radius: 16px;
      background: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(28, 25, 23, 0.06);
    }

    .qr-code {
      display: block;
      width: min(58vw, 300px);
      max-width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .scan-note {
      margin-top: clamp(0.9rem, 2.4vh, 1.4rem);
      color: var(--text-muted);
      font-family: "Noto Serif SC", serif;
      font-size: clamp(1rem, 1.5vw, 1.22rem);
      font-weight: 700;
      text-align: center;
    }

    .brand {
      position: absolute;
      left: clamp(1.15rem, 4vw, 4rem);
      bottom: clamp(1.1rem, 3.5vh, 2.4rem);
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: clamp(0.78rem, 1vw, 0.92rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-logo {
      width: clamp(7rem, 12vw, 10.6rem);
      height: auto;
      opacity: 0.82;
    }

    .slide-number {
      position: absolute;
      right: clamp(1.15rem, 4vw, 4rem);
      bottom: clamp(1.1rem, 3.5vh, 2.4rem);
      z-index: 2;
      color: var(--text-light, #a8a29e);
      font-size: clamp(0.78rem, 1vw, 0.92rem);
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .slide {
        min-height: 100svh;
      }

      .content {
        grid-template-columns: 1fr;
        width: min(640px, 88vw);
        gap: clamp(1.5rem, 4vh, 2.4rem);
        padding: 2rem 0 5.5rem;
      }

      .copy {
        text-align: center;
      }

      .subhead {
        margin-left: auto;
        margin-right: auto;
      }

      .meta-row {
        justify-content: center;
      }

      .qr-panel {
        margin: 0 auto;
      }

      .qr-code {
        width: min(66vw, 280px);
      }
    }

    @media print {
      @page {
        size: 16in 9in;
        margin: 0;
      }

      html,
      body,
      .slide {
        width: 16in;
        height: 9in;
        min-height: 9in;
        overflow: hidden;
      }

      .slide {
        break-after: avoid;
        page-break-after: avoid;
      }
    }
  </style>
</head>
<body>
  <main class="slide">
    <section class="content" aria-label="4月27日诺基亚 AI+OPC 训练营二维码">
      <div class="copy">
        <div class="eyebrow">OPC AI Bootcamp</div>
        <h1>
          <span class="title-line">4月27日诺基亚</span>
          <span class="title-line"><span class="accent">AI + OPC</span> 训练营</span>
        </h1>
        <p class="subhead">现场签到与资料领取入口。打开手机扫一扫，进入训练营表单。</p>
        <div class="meta-row" aria-label="活动信息">
          <span class="pill">4月27日</span>
          <span class="pill">Nokia</span>
          <span class="pill">AI + OPC</span>
        </div>
      </div>

      <aside class="qr-panel">
        <div class="qr-title">扫码进入训练营表单</div>
        <div class="qr-shell">
          <img class="qr-code" src="08/assets/0410.jpg" alt="4月27日诺基亚 AI+OPC 训练营二维码">
        </div>
        <div class="scan-note">打开手机扫一扫</div>
      </aside>
    </section>

    <div class="brand">
      <span>OPC AI /</span>
      <img class="brand-logo" src="08/assets/yihe.png" alt="一核学院">
    </div>
    <div class="slide-number">QR / 01</div>
  </main>
</body>
</html>
