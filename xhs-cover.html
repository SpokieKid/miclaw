<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #f5f0ea;
      --terracotta: #e8634a;
      --bark: #1a1714;
      --bark-light: #8a7e72;
      --warm: #c4b5a3;
    }

    body {
      width: 1080px;
      height: 1440px;
      overflow: hidden;
      background: var(--cream);
      font-family: 'Noto Sans SC', 'Inter', -apple-system, sans-serif;
      color: var(--bark);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Top spacer + label ── */
    .top-label {
      margin-top: 80px;
      font-size: 26px;
      color: var(--bark-light);
      letter-spacing: 6px;
    }

    /* ── Product image ── */
    .product-img {
      margin-top: 56px;
      width: 420px;
      height: 420px;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(26,23,20,0.10));
    }

    /* ── Headline + subtitle ── */
    .text-block {
      text-align: center;
      margin-top: 96px;
      padding: 0 72px;
    }

    .headline {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 72px;
      font-weight: 400;
      line-height: 1.35;
      letter-spacing: 2px;
      color: var(--bark);
    }

    .headline .accent {
      color: var(--terracotta);
    }

    .subtitle {
      margin-top: 20px;
      font-size: 28px;
      color: var(--bark-light);
      letter-spacing: 3px;
    }

    /* ── Spacer pushes CTA + bottom down ── */
    .spacer { flex: 1; }

    /* ── CTA pill ── */
    .cta-pill {
      background: var(--terracotta);
      color: #fff;
      font-size: 28px;
      font-weight: 600;
      padding: 18px 44px;
      border-radius: 50px;
      letter-spacing: 2px;
      margin-bottom: 48px;
    }

    .cta-pill .arrow {
      margin-left: 8px;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      width: 100%;
      padding: 0 64px 56px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .brand {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 28px;
      color: var(--bark);
      letter-spacing: 1px;
    }

    .disclaimer {
      font-size: 18px;
      color: var(--warm);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Top label -->
  <div class="top-label">OpenClaw 语音输入麦克风</div>

  <!-- Product image -->
  <img class="product-img" src="./web/public/product-white.png" alt="EinClaw Mic">

  <!-- Headline + subtitle -->
  <div class="text-block">
    <div class="headline">随时随地<br>向你的<span class="accent">小龙虾</span><span class="accent">发语音</span></div>
    <div class="subtitle">直连 OpenClaw 的语音对讲机</div>
  </div>

  <!-- Flexible spacer -->
  <div class="spacer"></div>

  <!-- CTA pill -->
  <div class="cta-pill">预售开启<span class="arrow">&rarr;</span></div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="brand">EinClaw Mic</div>
    <div class="disclaimer">* 硬件设计非最终版本</div>
  </div>

</body>
</html>
