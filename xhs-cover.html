<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #f5f0ea;
      --cream-dark: #ebe4db;
      --terracotta: #e8634a;
      --bark: #1a1714;
      --bark-light: #8a7e72;
      --warm: #c4b5a3;
      --sage: #7a8a6e;
    }

    body {
      width: 1080px;
      height: 1440px;
      overflow: hidden;
      background: var(--cream);
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--bark);
      position: relative;
    }

    /* ── Subtle texture overlay ── */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 80% 20%, rgba(232,99,74,0.06), transparent),
        radial-gradient(ellipse 600px 800px at 15% 85%, rgba(122,138,110,0.05), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: 64px 72px 56px;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 48px;
    }

    .badge-crowdfund {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--terracotta);
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 12px 24px;
      border-radius: 40px;
    }

    .badge-crowdfund .dot {
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .category-label {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 20px;
      letter-spacing: 3px;
      color: var(--bark-light);
      text-transform: uppercase;
    }

    /* ── Hero section: title + device ── */
    .hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .hero-text {
      flex: 1;
      padding-right: 32px;
    }

    .brand-name {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 108px;
      line-height: 0.95;
      color: var(--bark);
      letter-spacing: -2px;
    }

    .brand-mic {
      font-family: 'DM Serif Display', Georgia, serif;
      font-style: italic;
      font-size: 84px;
      color: var(--terracotta);
      line-height: 1.1;
      margin-top: -4px;
    }

    .device-frame {
      flex-shrink: 0;
      width: 340px;
      height: 340px;
      position: relative;
    }


    .device-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(26,23,20,0.12));
    }

    /* ── Divider ── */
    .divider {
      width: 120px;
      height: 4px;
      background: var(--terracotta);
      border-radius: 2px;
      margin-bottom: 40px;
    }

    /* ── Chinese headline ── */
    .headline-cn {
      font-size: 58px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .headline-cn .accent {
      color: var(--terracotta);
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: 32px;
      color: var(--bark-light);
      letter-spacing: 4px;
      margin-bottom: 48px;
    }

    /* ── CTA dark card ── */
    .cta-card {
      background: var(--bark);
      border-radius: 24px;
      padding: 32px 40px;
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 44px;
    }

    .mic-icon {
      width: 56px;
      height: 56px;
      background: var(--terracotta);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .mic-icon svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .cta-text {
      color: #fff;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .cta-text .claw {
      color: var(--terracotta);
      font-family: 'DM Serif Display', Georgia, serif;
      font-style: italic;
    }

    /* ── 3-step flow ── */
    .flow {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 44px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--cream-dark);
      border-radius: 16px;
      padding: 20px 28px;
    }

    .step-num {
      width: 40px;
      height: 40px;
      background: var(--terracotta);
      color: #fff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .step-label {
      font-size: 24px;
      font-weight: 600;
      color: var(--bark);
      white-space: nowrap;
    }

    .flow-arrow {
      font-size: 28px;
      color: var(--warm);
      flex-shrink: 0;
    }

    /* ── Price badge ── */
    .price-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 48px;
    }

    .price {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 52px;
      color: var(--terracotta);
      letter-spacing: -1px;
    }

    .price-label {
      font-size: 22px;
      color: var(--bark-light);
      background: var(--cream-dark);
      padding: 10px 22px;
      border-radius: 10px;
      font-weight: 500;
    }

    /* ── Bottom bar ── */
    .bottom {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .site-url {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 28px;
      color: var(--bark-light);
      letter-spacing: 1px;
    }

    .tags {
      display: flex;
      gap: 12px;
    }

    .tag {
      font-size: 20px;
      color: var(--bark-light);
      background: var(--cream-dark);
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 500;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Top bar -->
    <div class="top-bar">
      <div class="badge-crowdfund">
        <span class="dot"></span>
        众筹进行中
      </div>
      <div class="category-label">Voice-to-Action</div>
    </div>

    <!-- Hero: Title + Device -->
    <div class="hero">
      <div class="hero-text">
        <div class="brand-name">EinClaw</div>
        <div class="brand-mic">Mic</div>
      </div>
      <div class="device-frame">
        <img class="device-img" src="./web/public/product-white.png" alt="EinClaw Mic">
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Chinese headline -->
    <div class="headline-cn">
      从想法到结果的<span class="accent">高速路</span>
    </div>

    <!-- Subtitle -->
    <div class="subtitle">说话，忘记，看结果。</div>

    <!-- CTA card -->
    <div class="cta-card">
      <div class="mic-icon">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="1" width="6" height="13" rx="3"/>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
          <line x1="12" y1="18" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <div class="cta-text">你只管说，剩下的交给 <span class="claw">Claw</span></div>
    </div>

    <!-- 3-step flow -->
    <div class="flow">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-label">按下说话</div>
      </div>
      <div class="flow-arrow">&#x2192;</div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-label">自动执行</div>
      </div>
      <div class="flow-arrow">&#x2192;</div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-label">查看结果</div>
      </div>
    </div>

    <!-- Price -->
    <div class="price-row">
      <div class="price">&yen;199</div>
      <div class="price-label">预定 Demo 样机</div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom">
      <div class="site-url">einclaw.cn</div>
      <div class="tags">
        <span class="tag">#语音对讲机</span>
        <span class="tag">#AI硬件</span>
        <span class="tag">#OpenClaw</span>
      </div>
    </div>

  </div>
</body>
</html>
